<!-- ═══════════════════════════════════════════════════════════════════════
     Sierra Log & Timber — Floor Plan Widget
     Drop this snippet into any WordPress page, Elementor Custom HTML block,
     or theme template. Update the two src/href paths to wherever you
     uploaded floorplan-widget.css and floorplan-widget.js.
═══════════════════════════════════════════════════════════════════════════ -->

<!-- 1. Widget stylesheet — update path if needed -->
<link rel="stylesheet" href="floorplan-widget.css">

<!-- 2. Widget root -->
<div id="floorplan-widget">
  <!-- Filter bar renders here -->
  <div id="fp-filters"></div>

  <!-- Product grid renders here -->
  <div id="fp-grid"></div>
</div>

<!-- 3. Widget script — must come after the div above -->
<script src="floorplan-widget.js"></script>
