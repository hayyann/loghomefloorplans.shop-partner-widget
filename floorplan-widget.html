<style>
/* ─── PARTNER CUSTOMIZATION ─────────────────────────────────────────────────
   Override these on your site to match your brand:
   #floorplan-widget { --fp-accent: #your-color; --fp-card-radius: 10px; }
─────────────────────────────────────────────────────────────────────────── */
#floorplan-widget {
  --fp-accent:      #2D4A2D;
  --fp-card-radius: 8px;
  --fp-font:        inherit;
  --fp-bg:          #ffffff;
  --fp-border:      #e2e2e2;
  --fp-chip-bg:     #f4f4f2;
  --fp-chip-on-bg:  var(--fp-accent);
  --fp-chip-on-fg:  #ffffff;
  --fp-text:        #1a1a1a;
  --fp-muted:       #6b6b6b;
  --fp-badge-bg:    rgba(0,0,0,.55);
  --fp-new-bg:      var(--fp-accent);
  --fp-shadow:      0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  font-family:  var(--fp-font);
  color:        var(--fp-text);
  box-sizing:   border-box;
  max-width:    1200px;
  margin:       0 auto;
  padding:      0 16px 40px;
}
#floorplan-widget *, #floorplan-widget *::before, #floorplan-widget *::after { box-sizing: inherit; }

/* Header / logo */
.fp-header { padding:24px 0 8px; text-align:center; }
.fp-logo { display:inline-block; max-height:72px; width:auto; }

/* Top row */
.fp-top-row { display:flex; align-items:center; flex-wrap:wrap; gap:10px; padding:20px 0 12px; }
.fp-search { flex:1 1 200px; min-width:0; height:40px; padding:0 12px; border:1px solid var(--fp-border); border-radius:6px; font-family:var(--fp-font); font-size:14px; color:var(--fp-text); background:var(--fp-bg); outline:none; transition:border-color .15s; }
.fp-search:focus { border-color:var(--fp-accent); }
.fp-sort { height:40px; padding:0 10px; border:1px solid var(--fp-border); border-radius:6px; font-family:var(--fp-font); font-size:14px; color:var(--fp-text); background:var(--fp-bg); cursor:pointer; outline:none; }
.fp-sort:focus { border-color:var(--fp-accent); }
.fp-count { font-size:13px; color:var(--fp-muted); white-space:nowrap; }

/* Filter groups */
.fp-filter-group { margin-bottom:10px; }
.fp-filter-group__label { display:block; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--fp-muted); margin-bottom:6px; }
.fp-chips { display:flex; flex-wrap:wrap; gap:6px; }
.fp-chip { padding:5px 12px; border:1px solid var(--fp-border); border-radius:20px; background:var(--fp-chip-bg); font-family:var(--fp-font); font-size:13px; color:var(--fp-text); cursor:pointer; line-height:1.4; transition:background .12s, border-color .12s, color .12s; white-space:nowrap; }
.fp-chip:hover { border-color:var(--fp-accent); color:var(--fp-accent); }
.fp-chip--on { background:var(--fp-chip-on-bg); border-color:var(--fp-chip-on-bg); color:var(--fp-chip-on-fg); }
.fp-chip--on:hover { background:var(--fp-chip-on-bg); color:var(--fp-chip-on-fg); opacity:.88; }
.fp-filter-row { display:flex; flex-wrap:wrap; gap:16px 28px; padding:4px 0 6px; }

/* Grid */
#fp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:24px; }
@media (max-width:900px) { #fp-grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:520px) { #fp-grid { grid-template-columns:1fr; gap:14px; } }

/* Card */
.fp-card { display:flex; flex-direction:column; border-radius:var(--fp-card-radius); overflow:hidden; background:var(--fp-bg); border:1px solid var(--fp-border); box-shadow:var(--fp-shadow); text-decoration:none; color:inherit; transition:transform .15s, box-shadow .15s; }
.fp-card:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.1), 0 12px 32px rgba(0,0,0,.08); }
.fp-card__media { position:relative; width:100%; padding-top:66%; overflow:hidden; background:#f0ede8; flex-shrink:0; }
.fp-card__img, .fp-card__img-placeholder { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s ease; }
.fp-card:hover .fp-card__img { transform:scale(1.03); }
.fp-card__img-placeholder { background:linear-gradient(135deg,#e8e4de 0%,#d4cfc8 100%); }
.fp-card__badge { position:absolute; bottom:8px; left:8px; background:var(--fp-badge-bg); color:#fff; font-size:11px; font-weight:500; padding:3px 8px; border-radius:4px; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); letter-spacing:.02em; max-width:calc(100% - 16px); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fp-card__new { position:absolute; top:8px; left:8px; background:var(--fp-new-bg); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; text-transform:uppercase; letter-spacing:.05em; }
.fp-card__body { padding:14px 16px 16px; flex:1; }
.fp-card__title { font-size:15px; font-weight:600; margin:0 0 5px; line-height:1.35; color:var(--fp-text); }
.fp-card__specs { font-size:13px; color:var(--fp-muted); margin:0 0 6px; line-height:1.4; }
.fp-card__price { font-size:14px; font-weight:600; color:var(--fp-accent); margin:0; }

/* States */
.fp-loading, .fp-empty, .fp-error { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--fp-muted); font-size:15px; }
.fp-error { color:#c0392b; }
.fp-spinner { display:inline-block; width:22px; height:22px; border:3px solid var(--fp-border); border-top-color:var(--fp-accent); border-radius:50%; animation:fp-spin .7s linear infinite; margin-right:10px; vertical-align:middle; }
@keyframes fp-spin { to { transform:rotate(360deg); } }
.fp-clear-btn { display:inline-block; margin-top:12px; padding:7px 18px; border:1px solid var(--fp-accent); border-radius:5px; background:transparent; color:var(--fp-accent); font-family:var(--fp-font); font-size:14px; cursor:pointer; transition:background .12s, color .12s; }
.fp-clear-btn:hover { background:var(--fp-accent); color:#fff; }
</style>

<div id="floorplan-widget">
  <div class="fp-header">
    <a href="https://loghomefloorplans.shop" target="_blank" rel="noopener">
      <img class="fp-logo" src="https://cdn.shopify.com/s/files/1/0987/2415/1660/files/Horizontal_Logo_10.png?v=1780363093" alt="Sierra Log &amp; Timber" loading="lazy">
    </a>
  </div>
  <div id="fp-filters"></div>
  <div id="fp-grid"></div>
</div>

<script>
(function () {
  const SHOP_URL        = 'https://loghomefloorplans.shop';
  const STOREFRONT_TOKEN = '6ee8c6b5fd28b442383d13f69f44e7bc';
  const API_VERSION     = '2024-10';
  const COLLECTION_HANDLE = 'all';
  const PRODUCTS_PER_PAGE = 250;
  const ENDPOINT        = `${SHOP_URL}/api/${API_VERSION}/graphql.json`;

  let allProducts = [];
  let filterState = { size:'all', style:'any', bedrooms:'any', bathrooms:'any', stories:'any', garage:'any', basement:'any', sort:'default', q:'' };

  function buildQuery(cursor) {
    const after = cursor ? `, after: "${cursor}"` : '';
    return `{
      collection(handle: "${COLLECTION_HANDLE}") {
        products(first: ${PRODUCTS_PER_PAGE}${after}) {
          edges {
            node {
              id title handle tags
              featuredImage { url(transform: { maxWidth: 600 }) altText }
              priceRange { minVariantPrice { amount currencyCode } }
              metafields(identifiers: [
                { namespace: "custom", key: "no_of_bedroom" }
                { namespace: "custom", key: "no_of_bathrooms" }
                { namespace: "custom", key: "no_of_stories" }
                { namespace: "custom", key: "sq_ft" }
                { namespace: "custom", key: "garage" }
                { namespace: "custom", key: "basement" }
                { namespace: "custom", key: "home_style" }
                { namespace: "custom", key: "project_name" }
              ]) { namespace key value }
            }
          }
          pageInfo { hasNextPage endCursor }
        }
      }
    }`;
  }

  async function gql(query) {
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': STOREFRONT_TOKEN },
      body: JSON.stringify({ query })
    });
    if (!res.ok) throw new Error('Storefront API error ' + res.status);
    return res.json();
  }

  async function fetchAllProducts() {
    const products = [];
    let cursor = null, hasNext = true;
    while (hasNext) {
      const data = await gql(buildQuery(cursor));
      const col = data && data.data && data.data.collection;
      if (!col) break;
      col.products.edges.forEach(function (edge) { products.push(normalizeProduct(edge.node)); });
      hasNext = col.products.pageInfo.hasNextPage;
      cursor  = col.products.pageInfo.endCursor;
    }
    return products;
  }

  function normalizeProduct(node) {
    const mf = {};
    (node.metafields || []).forEach(function (m) { if (m) mf[m.key] = m.value; });

    let style = mf.home_style || '';
    if (style.startsWith('[')) { try { style = JSON.parse(style); } catch (e) { style = [style]; } }
    else { style = style ? [style] : []; }

    const sqft     = parseFloat(mf.sq_ft) || 0;
    const beds     = parseInt(mf.no_of_bedroom, 10) || 0;
    const baths    = parseFloat(mf.no_of_bathrooms) || 0;
    const stories  = parseFloat(mf.no_of_stories) || 0;
    const garage   = (mf.garage || '').toLowerCase();
    const basement = (mf.basement || '').toLowerCase();
    const price    = parseFloat((node.priceRange && node.priceRange.minVariantPrice && node.priceRange.minVariantPrice.amount) || 0);
    const tags     = node.tags || [];
    const isNew    = tags.indexOf('new') !== -1;
    const isADU    = style.some(function (s) { return s.toLowerCase() === 'adu'; }) || tags.indexOf('adu') !== -1;

    return { id:node.id, title:node.title, handle:node.handle, tags:tags,
             image:node.featuredImage ? node.featuredImage.url : '',
             imageAlt:node.featuredImage ? (node.featuredImage.altText || node.title) : node.title,
             price:price, sqft:sqft, beds:beds, baths:baths, stories:stories,
             garage:garage, basement:basement, style:style, isNew:isNew, isADU:isADU,
             projectName:mf.project_name || '' };
  }

  function applyFilters(products) {
    var fs = filterState;
    var result = products.filter(function (p) {
      if      (fs.size === 'adu')       { if (!p.isADU) return false; }
      else if (fs.size === 'u1000')     { if (p.sqft === 0 || p.sqft >= 1000) return false; }
      else if (fs.size === '1000-1500') { if (p.sqft < 1000 || p.sqft >= 1500) return false; }
      else if (fs.size === '1500-2500') { if (p.sqft < 1500 || p.sqft >= 2500) return false; }
      else if (fs.size === 'a2500')     { if (p.sqft < 2500) return false; }
      if (fs.style !== 'any') {
        if (!p.style.some(function (s) { return s.toLowerCase() === fs.style.toLowerCase(); })) return false;
      }
      if (fs.bedrooms  !== 'any' && p.beds    < parseInt(fs.bedrooms, 10))    return false;
      if (fs.bathrooms !== 'any' && p.baths   < parseFloat(fs.bathrooms))     return false;
      if (fs.stories   !== 'any' && p.stories !== parseFloat(fs.stories))     return false;
      if (fs.garage    !== 'any' && p.garage   !== fs.garage)                 return false;
      if (fs.basement  !== 'any' && p.basement !== fs.basement)               return false;
      if (fs.q) {
        var needle = fs.q.toLowerCase();
        var hay = [p.title, p.projectName, p.style.join(' '), String(p.beds), String(p.baths), String(p.sqft), p.tags.join(' ')].join(' ').toLowerCase();
        if (hay.indexOf(needle) === -1) return false;
      }
      return true;
    });
    if      (fs.sort === 'name-asc')   result.sort(function (a, b) { return a.title.localeCompare(b.title); });
    else if (fs.sort === 'name-desc')  result.sort(function (a, b) { return b.title.localeCompare(a.title); });
    else if (fs.sort === 'size-asc')   result.sort(function (a, b) { return a.sqft - b.sqft; });
    else if (fs.sort === 'size-desc')  result.sort(function (a, b) { return b.sqft - a.sqft; });
    else if (fs.sort === 'price-asc')  result.sort(function (a, b) { return a.price - b.price; });
    else if (fs.sort === 'price-desc') result.sort(function (a, b) { return b.price - a.price; });
    return result;
  }

  function toTitleCase(str) {
    return str.replace(/\w\S*/g, function (w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); });
  }
  function fmtBaths(n) { return n % 1 === 0 ? String(n) : n.toFixed(1); }
  function fmtSqft(n)  { return n > 0 ? n.toLocaleString() + ' sf' : ''; }
  function fmtPrice(n) { return n > 0 ? '$' + n.toLocaleString() : ''; }
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderCard(p) {
    var styleLabel = p.style.join(' · ');
    var specs = [];
    if (p.beds)  specs.push(p.beds + ' bd');
    if (p.baths) specs.push(fmtBaths(p.baths) + ' ba');
    if (p.sqft)  specs.push(fmtSqft(p.sqft));
    var imgHtml = p.image
      ? '<img class="fp-card__img" src="' + p.image + '" alt="' + esc(p.imageAlt) + '" loading="lazy">'
      : '<div class="fp-card__img-placeholder"></div>';
    return '<a class="fp-card" href="' + SHOP_URL + '/products/' + p.handle + '" target="_blank" rel="noopener">'
      + '<div class="fp-card__media">' + imgHtml
        + (styleLabel ? '<span class="fp-card__badge">' + esc(styleLabel) + '</span>' : '')
        + (p.isNew    ? '<span class="fp-card__new">New</span>' : '')
      + '</div>'
      + '<div class="fp-card__body">'
        + '<p class="fp-card__title">' + esc(toTitleCase(p.title)) + '</p>'
        + (specs.length ? '<p class="fp-card__specs">' + specs.join(' &middot; ') + '</p>' : '')
        + (fmtPrice(p.price) ? '<p class="fp-card__price">' + esc(fmtPrice(p.price)) + '</p>' : '')
      + '</div></a>';
  }

  function chipGroup(label, filterId, options) {
    var chips = options.map(function (opt) {
      var on = filterState[filterId] === opt[0] ? ' fp-chip--on' : '';
      return '<button class="fp-chip' + on + '" data-filter="' + filterId + '" data-val="' + opt[0] + '">' + opt[1] + '</button>';
    }).join('');
    return '<div class="fp-filter-group"><span class="fp-filter-group__label">' + label + '</span><div class="fp-chips">' + chips + '</div></div>';
  }

  function renderFilters() {
    var container = document.getElementById('fp-filters');
    if (!container) return;
    container.innerHTML =
      '<div class="fp-top-row">'
        + '<input class="fp-search" type="search" id="fp-search" placeholder="Search plans…" autocomplete="off" value="' + esc(filterState.q) + '">'
        + '<select class="fp-sort" id="fp-sort">'
          + '<option value="default">Sort: Default</option>'
          + '<option value="name-asc">Name A–Z</option>'
          + '<option value="name-desc">Name Z–A</option>'
          + '<option value="size-asc">Size: Small first</option>'
          + '<option value="size-desc">Size: Large first</option>'
          + '<option value="price-asc">Price: Low to high</option>'
          + '<option value="price-desc">Price: High to low</option>'
        + '</select>'
        + '<span class="fp-count" id="fp-count"></span>'
      + '</div>'
      + chipGroup('Size', 'size', [['all','All'],['adu','ADU'],['u1000','Under 1,000 sf'],['1000-1500','1,000–1,500 sf'],['1500-2500','1,500–2,500 sf'],['a2500','2,500+ sf']])
      + chipGroup('Style', 'style', [['any','Any'],['Mountain','Mountain'],['ADU','ADU'],['Barn','Barn'],['Barndominium','Barndominium'],['Ranch','Ranch'],['Modern','Modern'],['Garage','Garage'],['Shade Structures','Shade Structures']])
      + '<div class="fp-filter-row">'
        + chipGroup('Beds',     'bedrooms',  [['any','Any'],['1','1+'],['2','2+'],['3','3+'],['4','4+']])
        + chipGroup('Baths',    'bathrooms', [['any','Any'],['1','1+'],['2','2+'],['3','3+']])
        + chipGroup('Stories',  'stories',   [['any','Any'],['1','1'],['1.5','1.5'],['2','2']])
        + chipGroup('Garage',   'garage',    [['any','Any'],['yes','Yes'],['no','No']])
        + chipGroup('Basement', 'basement',  [['any','Any'],['yes','Yes'],['no','No']])
      + '</div>';
    var sortEl = document.getElementById('fp-sort');
    if (sortEl) sortEl.value = filterState.sort;
    bindEvents();
  }

  function bindEvents() {
    var root = document.getElementById('floorplan-widget');
    if (!root) return;
    root.addEventListener('click', function (e) {
      var btn = e.target.closest('.fp-chip');
      if (!btn) return;
      var filter = btn.dataset.filter, val = btn.dataset.val;
      if (!filter) return;
      filterState[filter] = val;
      btn.closest('.fp-chips').querySelectorAll('.fp-chip').forEach(function (b) {
        b.classList.toggle('fp-chip--on', b === btn);
      });
      update();
    });
    var searchEl = document.getElementById('fp-search');
    if (searchEl) {
      var timer;
      searchEl.addEventListener('input', function () {
        clearTimeout(timer);
        timer = setTimeout(function () { filterState.q = searchEl.value.trim(); update(); }, 250);
      });
    }
    var sortEl = document.getElementById('fp-sort');
    if (sortEl) sortEl.addEventListener('change', function () { filterState.sort = sortEl.value; update(); });
  }

  function clearFilters() {
    filterState = { size:'all', style:'any', bedrooms:'any', bathrooms:'any', stories:'any', garage:'any', basement:'any', sort:'default', q:'' };
    renderFilters();
    update();
  }

  function renderGrid(products) {
    var grid = document.getElementById('fp-grid');
    var count = document.getElementById('fp-count');
    if (!grid) return;
    if (products.length === 0) {
      grid.innerHTML = '<div class="fp-empty">No floor plans match your filters.<br><button class="fp-clear-btn" id="fp-clear">Clear filters</button></div>';
      var clearBtn = document.getElementById('fp-clear');
      if (clearBtn) clearBtn.addEventListener('click', clearFilters);
      if (count) count.textContent = '';
      return;
    }
    grid.innerHTML = products.map(renderCard).join('');
    if (count) count.textContent = products.length + ' plan' + (products.length === 1 ? '' : 's');
  }

  function showLoading() {
    var grid = document.getElementById('fp-grid');
    if (grid) grid.innerHTML = '<div class="fp-loading"><span class="fp-spinner" aria-hidden="true"></span>Loading floor plans…</div>';
  }

  function showError(msg) {
    var grid = document.getElementById('fp-grid');
    if (grid) grid.innerHTML = '<div class="fp-error">' + esc(msg) + '</div>';
  }

  function update() { renderGrid(applyFilters(allProducts)); }

  async function init() {
    var root = document.getElementById('floorplan-widget');
    if (!root) return;
    renderFilters();
    showLoading();
    try {
      allProducts = await fetchAllProducts();
      update();
    } catch (err) {
      console.error('[FloorplanWidget]', err);
      showError('Unable to load floor plans. Please try again later.');
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
