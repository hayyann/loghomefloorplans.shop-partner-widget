<!-- ═══════════════════════════════════════════════════════════════════════
     Sierra Log & Timber — Floor Plan Widget
     Paste this entire block into an Elementor Custom HTML block
     or any WordPress Custom HTML widget. That's it — nothing else to install.
═══════════════════════════════════════════════════════════════════════════ -->

<iframe
  id="fp-iframe"
  src="https://hayyann.github.io/loghomefloorplans.shop-partner-widget/iframe-widget/iframe-embed.html"
  width="100%"
  frameborder="0"
  scrolling="auto"
  style="display:block; width:100%; height:100vh; border:none;"
  title="Sierra Log &amp; Timber Floor Plans"
></iframe>

<script>
(function () {
  var iframe = document.getElementById('fp-iframe');

  /* ── Lightbox — appended to <body> so position:fixed hits the real viewport ── */
  var lb = document.createElement('div');
  lb.style.cssText = [
    'display:none',
    'position:fixed',
    'inset:0',
    'z-index:2147483647',     /* max possible z-index */
    'align-items:center',
    'justify-content:center',
    'background:rgba(0,0,0,.9)'
  ].join(';');

  var backdrop = document.createElement('div');
  backdrop.style.cssText = 'position:absolute;inset:0;cursor:pointer;';

  var frame = document.createElement('div');
  frame.style.cssText = 'position:relative;z-index:1;display:flex;align-items:center;justify-content:center;max-width:92vw;max-height:92vh;padding:16px;';

  var img = document.createElement('img');
  img.alt = 'Floor plan';
  img.style.cssText = 'max-width:100%;max-height:88vh;object-fit:contain;border-radius:6px;box-shadow:0 12px 60px rgba(0,0,0,.6);background:#fff;display:block;';

  var closeBtn = document.createElement('button');
  closeBtn.setAttribute('aria-label', 'Close');
  closeBtn.innerHTML = '&times;';
  closeBtn.style.cssText = 'position:absolute;top:16px;right:16px;z-index:2;width:40px;height:40px;border:none;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:26px;line-height:1;cursor:pointer;';

  frame.appendChild(img);
  lb.appendChild(backdrop);
  lb.appendChild(frame);
  lb.appendChild(closeBtn);
  document.body.appendChild(lb);

  function openLb(src) {
    img.src = src;
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    lb.style.display = 'none';
    document.body.style.overflow = '';
    img.src = '';
  }

  backdrop.addEventListener('click', closeLb);
  closeBtn.addEventListener('click', closeLb);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeLb(); });

  /* ── Messages from widget iframe ── */
  window.addEventListener('message', function (e) {
    if (!e.data) return;
    if (e.data.type === 'fp-lightbox-open' && e.data.src) openLb(e.data.src);
    if (e.data.type === 'fp-lightbox-close') closeLb();
  });
})();
</script>
