     Sierra Log & Timber — Floor Plan Widget
     Paste this entire block into an Elementor Custom HTML block
     or any WordPress Custom HTML widget. That's it — nothing else to install.
═══════════════════════════════════════════════════════════════════════════ -->

<iframe
  id="fp-iframe"
  src="https://hayyann.github.io/loghomefloorplans.shop-partner-widget/iframe-widget/iframe-embed.html"
  width="100%"
  height="800"
  frameborder="0"
  scrolling="no"
  style="display:block; width:100%; border:none; overflow:hidden;"
  title="Sierra Log &amp; Timber Floor Plans"
></iframe>

<script>
(function () {
  var iframe      = document.getElementById('fp-iframe');
  var naturalH    = '800px';
  var isExpanded  = false;

  window.addEventListener('message', function (e) {
    if (!e.data) return;

    // Auto-height
    if (e.data.type === 'fp-resize' && typeof e.data.height === 'number') {
      naturalH = e.data.height + 'px';
      if (!isExpanded) iframe.style.height = naturalH;
    }

    // Expand iframe to full viewport so the in-widget lightbox centers correctly
    if (e.data.type === 'fp-lightbox-expand') {
      isExpanded = true;
      iframe.style.cssText = [
        'display:block',
        'position:fixed',
        'inset:0',
        'width:100%',
        'height:100%',
        'border:none',
        'overflow:hidden',
        'z-index:99999'
      ].join(';');
      document.body.style.overflow = 'hidden';
    }

    // Restore iframe to normal flow
    if (e.data.type === 'fp-lightbox-shrink') {
      isExpanded = false;
      iframe.style.cssText = [
        'display:block',
        'width:100%',
        'border:none',
        'overflow:hidden',
        'height:' + naturalH
      ].join(';');
      document.body.style.overflow = '';
    }
  });
})();
</script>
