<!-- ═══════════════════════════════════════════════════════════════════════
     Sierra Log & Timber — Floor Plan Widget
     Paste this entire block into an Elementor Custom HTML block
     or any WordPress Custom HTML widget. That's it — nothing else to install.
═══════════════════════════════════════════════════════════════════════════ -->

<iframe
  id="fp-iframe"
  src="https://hayyann.github.io/loghomefloorplans.shop-partner-widget/iframe-widget/iframe-embed.html"
  width="100%"
  height="800"
  frameborder="0"
  scrolling="no"
  style="display:block; width:100%; border:none; overflow:hidden;"
  title="Sierra Log &amp; Timber Floor Plans"
></iframe>

<!-- Lightbox lives on the parent page so position:fixed works correctly -->
<div id="fp-lb"
  style="display:none; position:fixed; inset:0; z-index:99999; align-items:center; justify-content:center; background:rgba(0,0,0,.88);"
  aria-hidden="true">
  <div id="fp-lb-backdrop"
    style="position:absolute; inset:0; cursor:pointer;"></div>
  <div style="position:relative; z-index:1; display:flex; align-items:center; justify-content:center; max-width:92vw; max-height:92vh; padding:16px;">
    <img id="fp-lb-img" src="" alt="Floor plan"
      style="max-width:100%; max-height:88vh; object-fit:contain; border-radius:6px; box-shadow:0 12px 60px rgba(0,0,0,.6); background:#fff; display:block;">
  </div>
  <button id="fp-lb-close" aria-label="Close"
    style="position:absolute; top:16px; right:16px; z-index:2; width:38px; height:38px; border:none; border-radius:50%; background:rgba(255,255,255,.18); color:#fff; font-size:24px; line-height:1; cursor:pointer;">&times;</button>
</div>

<script>
(function () {
  var iframe = document.getElementById('fp-iframe');
  var lb     = document.getElementById('fp-lb');
  var lbImg  = document.getElementById('fp-lb-img');

  function openLb(src) {
    lbImg.src = src;
    lb.style.display = 'flex';
    lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    lb.style.display = 'none';
    lb.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  document.getElementById('fp-lb-backdrop').addEventListener('click', closeLb);
  document.getElementById('fp-lb-close').addEventListener('click', closeLb);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeLb(); });

  window.addEventListener('message', function (e) {
    if (!e.data) return;
    if (e.data.type === 'fp-resize' && typeof e.data.height === 'number') {
      iframe.style.height = e.data.height + 'px';
    }
    if (e.data.type === 'fp-lightbox-open' && e.data.src) {
      openLb(e.data.src);
    }
    if (e.data.type === 'fp-lightbox-close') {
      closeLb();
    }
  });
})();
</script>
